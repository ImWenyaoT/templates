name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 每个模板是自包含的 pnpm 项目：矩阵逐项目安装并跑 typecheck / lint / test / build，
# 任一失败都会让该项目的作业变红。
jobs:
  check:
    name: ${{ matrix.project }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - json-yaml-xml-parser
          - nodejs-cli-file-search
          - random-red-black-tree-sort
          - web-front-end-snake-game
          - trumpet-twitter
          - ai-article-summarizer
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: ${{ matrix.project }}/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: ${{ matrix.project }}/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

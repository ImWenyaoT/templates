<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="一个纯前端 TypeScript Canvas 贪吃蛇小游戏" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Snake</title>
  </head>
  <body>
    <main id="app" class="app-shell" aria-label="Snake game">
      <section class="game-layout" aria-labelledby="game-title">
        <header class="top-bar">
          <div>
            <h1 id="game-title">Snake</h1>
            <p id="status-text" class="status-text">按 Start 开始</p>
          </div>
          <div class="score-strip" aria-label="Score board">
            <span>
              <strong id="score">0</strong>
              Score
            </span>
            <span>
              <strong id="best-score">0</strong>
              Best
            </span>
          </div>
        </header>

        <div class="play-surface">
          <canvas id="game-canvas" width="560" height="560" aria-label="Snake board"></canvas>
          <aside class="side-panel" aria-label="Game controls">
            <div class="button-row">
              <button id="start-button" type="button">Start</button>
              <button id="pause-button" type="button">Pause</button>
              <button id="restart-button" type="button">Restart</button>
            </div>
            <p class="hint">方向键 / WASD 控制，Space 暂停。</p>
            <div class="touch-pad" aria-label="Touch controls">
              <button type="button" data-action="move-up" aria-label="Move up">↑</button>
              <button type="button" data-action="move-left" aria-label="Move left">←</button>
              <button type="button" data-action="move-down" aria-label="Move down">↓</button>
              <button type="button" data-action="move-right" aria-label="Move right">→</button>
            </div>
          </aside>
        </div>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
